name: Build pyController Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pyController Code
        uses: actions/checkout@v4
        with:
          path: pycontroller

      - name: Checkout MicroPython
        uses: actions/checkout@v4
        with:
          repository: micropython/micropython
          ref: master
          path: micropython

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf python3 python3-pip python3-venv cmake ninja-build ccache libffi-dev dfu-util libusb-1.0-0

      - name: Setup ESP-IDF
        run: |
          git clone -b v5.3.1 --recursive https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh

      - name: Build mpy-cross
        run: |
          cd micropython/mpy-cross
          make -j$(nproc)

      - name: Build ESP32-S3 Firmware
        run: |
          source esp-idf/export.sh
          cd micropython/ports/esp32
          
          make BOARD=ESP32_GENERIC_S3 submodules
          
          # Use $GITHUB_WORKSPACE to cleanly point to the absolute path
          make BOARD=ESP32_GENERIC_S3 USER_C_MODULES=$GITHUB_WORKSPACE/pycontroller/usermod/micropython.cmake -j$(nproc)
          
          BUILD_DATE=$(date +%Y%m%d)
          cd build-ESP32_GENERIC_S3
          mv firmware.bin ESP32-S3_GENERIC_S3-${BUILD_DATE}-v1.28.0.bin

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyController-Firmware-v1.28.0
          path: |
            micropython/ports/esp32/build-ESP32_GENERIC_S3/ESP32-S3_GENERIC_S3-*-v1.28.0.bin